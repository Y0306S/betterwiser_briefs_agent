# BetterWiser Legal-Tech AI Briefing Agent — Master Configuration
# Edit recipients, sources, and thresholds here. Never put API keys here.

run:
  runs_dir: "runs"
  log_level: "INFO"

model:
  id: "claude-opus-4-6"
  extended_thinking_budget: 10000
  max_tokens: 16000
  max_context_sources: 30        # max scraped sources sent to Pass 2 draft
  source_content_max_chars: 4000 # truncate each source to this length

tracks:
  - id: "A"
    name: "Vendor & Customer Intelligence"
    prompt_template: "track_a_vendor_customer.txt"
    output_format: "date_bullets"
    item_count_min: 10
    item_count_max: 15
  - id: "B"
    name: "Global AI Policy & Regulatory Watch"
    prompt_template: "track_b_global_policy.txt"
    output_format: "bold_summary"
    item_count_min: 6
    item_count_max: 8
  - id: "C"
    name: "Thought Leadership"
    prompt_template: "track_c_thought_leadership.txt"
    output_format: "themed_sections"
    item_count_min: 5
    item_count_max: 20

