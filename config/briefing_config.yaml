# Grounding and quality thresholds
grounding:
  pass_rate_threshold: 0.95
  citation_coverage_threshold: 0.90
  fuzzy_match_threshold: 80       # thefuzz score 0-100

# Auto-expanding vendor watchlist threshold
vendor_watchlist:
  auto_add_threshold: 3           # appear in 3+ sources to trigger recommendation

