# Thought leaders for Track C person-specific deep search (Wave 2)
# Each person gets 4+ targeted searches per run
thought_leaders:
  - name: "Jamie Tso"
    affiliation: "Legal Quants"
    search_terms:
      - '"Jamie Tso" legal AI'
      - '"Jamie Tso" site:medium.com OR site:substack.com'
      - '"Jamie Tso" legalquants'
      - '"Jamie Tso" conference OR keynote OR panel'

  - name: "Anna Lozynski"
    affiliation: "Legal innovation consultant"
    search_terms:
      - '"Anna Lozynski" legal AI'
      - '"Anna Lozynski" innovation'
      - '"Anna Lozynski" site:linkedin.com OR site:substack.com'
      - '"Anna Lozynski" keynote OR panel'

  - name: "Patrick Tan"
    affiliation: "Legal AI Singapore"
    search_terms:
      - '"Patrick Tan" legal AI Singapore'
      - '"Patrick Tan" legal technology'
      - '"Patrick Tan" Singapore lawyer AI'
      - '"Patrick Tan" innovation legal'

  - name: "Damien Riehl"
    affiliation: "Legal AI researcher"
    search_terms:
      - '"Damien Riehl" legal AI'
      - '"Damien Riehl" generative AI law'
      - '"Damien Riehl" site:medium.com OR site:substack.com'
      - '"Damien Riehl" conference OR talk'

  - name: "Bob Ambrogi"
    affiliation: "LawNext / LawSites"
    search_terms:
      - '"Bob Ambrogi" legal AI'
      - '"Bob Ambrogi" lawnext'
      - '"Bob Ambrogi" site:lawnext.com'
      - '"Bob Ambrogi" podcast OR interview'

